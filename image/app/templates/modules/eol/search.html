{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1><i data-lucide="search" class="icon-sm"></i> Track Software</h1>
  <a href="/eol" class="btn btn-secondary btn-sm">← Back</a>
</div>

<div class="eol-search-wrap">
  <input
    type="search"
    id="eol-search-input"
    class="form-control"
    placeholder="Search for software (e.g. python, ubuntu, nodejs)…"
    autocomplete="off"
    hx-get="/eol/search"
    hx-trigger="input changed delay:300ms, search"
    hx-target="#eol-search-results"
    name="q"
    value="{{ q or '' }}"
    autofocus
  >
</div>

<div id="eol-search-results" class="eol-search-results">
  {% if results %}
    {% include "modules/eol/_search_results.html" %}
  {% else %}
  <p class="hint" style="margin-top:1rem">Start typing to search the endoflife.date database.</p>
  {% endif %}
</div>

{% endblock %}
