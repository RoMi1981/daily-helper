{% if meme %}
<div id="meme-widget" class="home-section" style="padding:0;overflow:hidden;position:relative">
  <img src="/memes/{{ meme.id }}/raw" alt="Meme of the Day"
       style="width:100%;max-height:480px;object-fit:contain;border-radius:8px;display:block;background:var(--bg-secondary);cursor:zoom-in"
       onclick="openLightbox(this.src)">
  <div style="position:absolute;bottom:0.5rem;right:0.5rem;display:flex;gap:0.35rem">
    <button type="button" class="btn btn-sm" title="{{ t('action.copy_image') }}" style="opacity:0.85"
            onclick="openLightbox('/memes/{{ meme.id }}/raw');setTimeout(function(){document.getElementById('lb-copy').click()},50)">
      <i data-lucide="clipboard-copy" class="icon-xs"></i>
    </button>
    <button type="button" class="btn btn-sm" title="Next meme" style="opacity:0.85"
            hx-post="/memes/next"
            hx-target="#meme-widget"
            hx-swap="outerHTML">
      <i data-lucide="chevron-right" class="icon-xs"></i>
    </button>
  </div>
</div>
{% endif %}
